name: update-flux

on:
  workflow_dispatch:
  schedule:
    # Runs at 03:34 UTC on the 1st of every month
    - cron: "34 3 1 * *"
    # Runs at 03:34 UTC on the 15th of every month
    - cron: "34 3 15 * *"
permissions:
  contents: write
  pull-requests: write

jobs:
  components:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main
      - name: Check for updates
        id: update
        run: |
          flux install \
            --components-extra=image-reflector-controller,image-automation-controller \
            --export > ./clusters/prod/mow/flux-system/gotk-components.yaml

          VERSION="$(flux -v)"
          echo "flux_version=$VERSION" >> $GITHUB_OUTPUT
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes
          if git diff --quiet; then
            echo "No changes detected"
            exit 0
          fi
          
          # Create branch and commit
          git checkout -b update-flux
          git add .
          git commit -m "Update to ${{ steps.update.outputs.flux_version }}"
          git push -f origin update-flux
          
          # Create or update PR using GitHub CLI
          if gh pr view update-flux --json number -q .number 2>/dev/null; then
            echo "PR already exists, updating..."
          else
            gh pr create \
              --base main \
              --head update-flux \
              --title "Update to ${{ steps.update.outputs.flux_version }}" \
              --body "${{ steps.update.outputs.flux_version }}"
          fi   
